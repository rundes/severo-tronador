name: Radio pull (grabar + transcribir)

# Cada 15 min: pide al app los programas que arrancan ahora (con pre-roll),
# graba con ffmpeg, transcribe con Whisper (timestamps), sube el audio a GCS y
# postea las menciones. No corre en Vercel (la grabación es larga).

on:
  schedule:
    # Cada 15 min: garantiza un tick en el pre-roll de cada programa (LEAD_MIN=15).
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: radio-pull
  cancel-in-progress: false

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 200
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar ffmpeg + Whisper (ctranslate2)
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install --quiet whisper-ctranslate2
      - name: Auth GCloud (service account)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Ingesta de radio
        env:
          APP_URL: ${{ vars.APP_URL || 'https://severo-tronador.vercel.app' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GCS_BUCKET: ${{ vars.GCS_BUCKET || 'maipu-pba' }}
          WHISPER_MODEL: ${{ vars.WHISPER_MODEL || 'base' }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::Falta secret CRON_SECRET"
            exit 1
          fi
          node tools/radio-pull.mjs
