#cloud-config
# Hetzner Cloud — bootstrap inicial Stalwart Mail Server para
# tronador.net.ar (Plan 04). Lanza un Debian 12 listo para correr
# bootstrap.sh.
#
# Uso:
#   1) Crear VPS Hetzner CX22, Debian 12, ubicación FSN1/NBG1.
#   2) Subir tu clave SSH a tu cuenta.
#   3) Pegar este YAML en "Cloud config" al crear el server.
#   4) Una vez UP, SSH como `tronador` y correr `sudo /opt/tronador/bootstrap.sh`.

users:
  - name: tronador
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: sudo
    shell: /bin/bash
    ssh_authorized_keys:
      # AGREGAR ACÁ tu clave pública SSH (ssh-ed25519 …)
      - ssh-ed25519 AAAA_REEMPLAZAR_POR_TU_CLAVE_PUBLICA your_comment

package_update: true
package_upgrade: true
packages:
  - ufw
  - curl
  - ca-certificates
  - gnupg
  - jq
  - unzip
  - htop
  - fail2ban

runcmd:
  # SSH hardening
  - sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
  - sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - systemctl restart ssh

  # Firewall — abrimos los puertos que necesita Stalwart + SSH.
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp        # ssh
  - ufw allow 25/tcp        # smtp
  - ufw allow 80/tcp        # acme http-01 + redirect
  - ufw allow 143/tcp       # imap
  - ufw allow 443/tcp       # jmap https + web admin
  - ufw allow 465/tcp       # smtps submission
  - ufw allow 587/tcp       # smtp submission
  - ufw allow 993/tcp       # imaps
  - ufw allow 8080/tcp      # admin api (restringir luego al IP de Vercel/admin)
  - ufw --force enable

  # Prep directorio para bootstrap del operador.
  - mkdir -p /opt/tronador
  - chown -R tronador:tronador /opt/tronador

write_files:
  - path: /opt/tronador/README.txt
    permissions: "0644"
    owner: tronador:tronador
    content: |
      Tronador Mail (Stalwart) — bootstrap pendiente.

      Próximo paso (sobre este server, como sudo):
        scp infra/stalwart/bootstrap.sh tronador@<IP>:/opt/tronador/
        ssh tronador@<IP> "sudo /opt/tronador/bootstrap.sh <FQDN> <ADMIN_EMAIL>"

      Ejemplo:
        sudo /opt/tronador/bootstrap.sh mail.tronador.net.ar admin@tronador.net.ar
